<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가맹점 오픈 현황</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#f0f2f5; color:#1a1a1a; font-size:14px; min-height:100vh; }

/* ── 헤더 ── */
.header { background:#1e293b; padding:0 28px; display:flex; align-items:center; justify-content:space-between; height:58px; position:sticky; top:0; z-index:200; }
.header-title { font-size:16px; font-weight:700; color:#fff; }
.header-sub { font-size:11px; color:#64748b; margin-top:1px; }
.header-right { display:flex; align-items:center; gap:8px; }
.btn { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; border:none; transition:all .15s; }
.btn-ghost { background:rgba(255,255,255,.1); color:#e2e8f0; border:1px solid rgba(255,255,255,.15); }
.btn-ghost:hover { background:rgba(255,255,255,.2); }
.btn-primary { background:#3b82f6; color:#fff; }
.btn-primary:hover { background:#2563eb; }
.sort-select { padding:5px 9px; border:1px solid rgba(255,255,255,.2); border-radius:7px; font-size:12px; background:rgba(255,255,255,.08); color:#e2e8f0; cursor:pointer; }
.sort-select option { background:#1e293b; }

/* ── 동기화 바 ── */
.sync-bar { padding:7px 28px; font-size:12px; display:none; align-items:center; gap:8px; font-weight:500; }
.sync-bar.show { display:flex; }
.sync-bar.loading { background:#eff6ff; color:#2563eb; border-bottom:1px solid #bfdbfe; }
.sync-bar.success { background:#f0fdf4; color:#15803d; border-bottom:1px solid #bbf7d0; }
.sync-bar.error   { background:#fef2f2; color:#dc2626; border-bottom:1px solid #fecaca; }
.spin { display:inline-block; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── 기간 탭 바 ── */
.period-wrap { position:sticky; top:58px; z-index:100; }
/* 월 행 */
.month-row { background:#fff; border-bottom:1px solid #e2e8f0; padding:0 28px; display:flex; align-items:center; gap:0; overflow-x:auto; }
.ptab { padding:13px 16px; font-size:13px; font-weight:600; color:#94a3b8; border-bottom:3px solid transparent; cursor:pointer; white-space:nowrap; transition:all .15s; margin-bottom:-1px; }
.ptab:hover { color:#475569; background:#f8fafc; }
.ptab.active { color:#2563eb; border-bottom-color:#2563eb; }
.ptab.all-tab { color:#64748b; }
.ptab.all-tab.active { color:#0f172a; border-bottom-color:#0f172a; }
/* 주 행 */
.week-row { background:#f8fafc; border-bottom:2px solid #e2e8f0; padding:0 28px; display:flex; align-items:center; gap:0; overflow-x:auto; min-height:0; transition:all .2s; }
.week-row.hidden { display:none; }
.wtab { padding:9px 14px; font-size:12px; font-weight:600; color:#94a3b8; border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; transition:all .15s; margin-bottom:-2px; }
.wtab:hover { color:#475569; background:#f1f5f9; }
.wtab.active { color:#7c3aed; border-bottom-color:#7c3aed; }
.wtab .wrange { font-size:10px; color:#94a3b8; font-weight:400; margin-left:4px; }

/* ── 본문 ── */
.main { padding:20px 28px; display:flex; flex-direction:column; gap:18px; }

/* ── KPI ── */
.kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
.kpi-card { background:#fff; border-radius:13px; padding:18px 20px; border:1px solid #e2e8f0; display:flex; align-items:center; gap:14px; }
.kpi-icon { width:42px; height:42px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
.ic-blue   { background:#eff6ff; }
.ic-green  { background:#f0fdf4; }
.ic-amber  { background:#fffbeb; }
.ic-purple { background:#faf5ff; }
.ic-red    { background:#fef2f2; }
.kpi-label { font-size:10px; color:#94a3b8; font-weight:700; letter-spacing:.4px; text-transform:uppercase; margin-bottom:3px; }
.kpi-value { font-size:26px; font-weight:800; color:#0f172a; line-height:1; }
.kpi-sub   { font-size:11px; color:#cbd5e1; margin-top:2px; }

/* ── 섹션 카드 ── */
.card { background:#fff; border-radius:13px; border:1px solid #e2e8f0; overflow:hidden; }
.card-header { padding:16px 22px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #f1f5f9; }
.card-title { font-size:14px; font-weight:700; color:#0f172a; }
.card-sub { font-size:11px; color:#94a3b8; margin-top:2px; }

/* ── 퍼널 ── */
.funnel-wrap { display:grid; grid-template-columns:repeat(6,1fr); gap:0; padding:16px 22px; }
.funnel-item { display:flex; align-items:center; }
.funnel-step { flex:1; border:1px solid #e2e8f0; border-radius:11px; padding:14px 10px; text-align:center; background:#f8fafc; }
.fs-icon  { font-size:22px; margin-bottom:7px; }
.fs-label { font-size:10px; color:#64748b; font-weight:700; letter-spacing:.3px; margin-bottom:5px; }
.fs-value { font-size:24px; font-weight:800; color:#0f172a; }
.fs-rate  { display:inline-block; margin-top:5px; font-size:11px; font-weight:700; padding:2px 7px; border-radius:20px; }
.fs-rate.up   { background:#dcfce7; color:#16a34a; }
.fs-rate.mid  { background:#fef9c3; color:#a16207; }
.fs-rate.low  { background:#fee2e2; color:#dc2626; }
.fs-rate.gray { background:#f1f5f9; color:#94a3b8; }
.f-arrow { font-size:20px; color:#d1d5db; padding:0 1px; flex-shrink:0; }
.filter-sel { padding:4px 9px; border:1px solid #e2e8f0; border-radius:7px; font-size:12px; background:#fff; color:#475569; cursor:pointer; }

/* ── 경로 카드 ── */
.route-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; padding:16px 22px; }
.rc { border-radius:11px; padding:14px; border:1px solid #e2e8f0; }
.rc.rc-all { background:#1e293b; border-color:#1e293b; }
.rc .rc-name { font-size:10px; font-weight:700; color:#64748b; margin-bottom:6px; display:flex; align-items:center; gap:4px; }
.rc.rc-all .rc-name { color:#475569; }
.rc .rc-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.rc .rc-num { font-size:26px; font-weight:800; color:#0f172a; line-height:1; }
.rc.rc-all .rc-num { color:#fff; }
.rc .rc-unit { font-size:11px; color:#94a3b8; }
.rc .rc-sync { font-size:9px; background:#eff6ff; color:#2563eb; padding:1px 5px; border-radius:5px; margin-left:auto; }
.rc hr { border:none; border-top:1px solid #f1f5f9; margin:9px 0; }
.rc.rc-all hr { border-top-color:rgba(255,255,255,.08); }
.rc-stat { display:flex; justify-content:space-between; font-size:11px; padding:1px 0; }
.rc-stat .rsl { color:#94a3b8; }
.rc-stat .rsv { font-weight:700; color:#475569; }
.rc.rc-all .rsv { color:#64748b; }

/* ── 테이블 공통 ── */
.rf-bar { padding:12px 22px; display:flex; gap:6px; flex-wrap:wrap; align-items:center; border-bottom:1px solid #f1f5f9; }
.rf-btn { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid #e2e8f0; background:#fff; cursor:pointer; color:#64748b; transition:all .15s; }
.rf-btn:hover:not(.active) { background:#f8fafc; }
.rf-btn.active { color:#fff; border-color:transparent; }
.rf-btn.active.all    { background:#1e293b; }
.rf-btn.active.meta   { background:#7c3aed; }
.rf-btn.active.carrot { background:#ea580c; }
.rf-btn.active.home   { background:#0891b2; }
.rf-btn.active.rep    { background:#059669; }
.rf-btn.active.mycha  { background:#db2777; }
.rf-btn.active.baemin { background:#16a34a; }

table { width:100%; border-collapse:collapse; }
thead tr { background:#f8fafc; }
th { padding:10px 14px; text-align:left; font-size:10px; font-weight:700; color:#64748b; letter-spacing:.4px; border-bottom:1px solid #f1f5f9; white-space:nowrap; text-transform:uppercase; }
td { padding:13px 14px; font-size:13px; color:#334155; border-bottom:1px solid #f8fafc; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fafbfd; }
.store-name { font-weight:700; color:#0f172a; font-size:13px; }
.route-badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:20px; font-size:10px; font-weight:700; }
.badge-meta   { background:#ede9fe; color:#6d28d9; }
.badge-carrot { background:#ffedd5; color:#c2410c; }
.badge-rep    { background:#d1fae5; color:#065f46; }
.badge-home   { background:#cffafe; color:#0e7490; }
.badge-mycha  { background:#fce7f3; color:#9d174d; }
.badge-baemin { background:#dcfce7; color:#15803d; }
.date-val { font-weight:600; color:#0f172a; white-space:nowrap; font-size:12px; }
.date-nil { color:#e2e8f0; font-size:12px; }
.prog-bar { height:5px; background:#f1f5f9; border-radius:3px; overflow:hidden; min-width:80px; margin-bottom:3px; }
.prog-fill { height:100%; border-radius:3px; }
.prog-text { font-size:10px; color:#94a3b8; }
.stage-btn { padding:3px 11px; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; border:1.5px solid; background:transparent; white-space:nowrap; }
.stage-btn:hover { opacity:.75; }

/* ── 섹션 구분 헤더 ── */
.tbl-section-header { padding:12px 22px 8px; display:flex; align-items:center; gap:10px; }
.tbl-section-title { font-size:13px; font-weight:700; }
.tbl-section-count { font-size:12px; font-weight:700; padding:2px 9px; border-radius:20px; }
.in-progress-header .tbl-section-title { color:#0f172a; }
.in-progress-header .tbl-section-count { background:#fef9c3; color:#a16207; }
.completed-header { border-top:2px solid #f1f5f9; }
.completed-header .tbl-section-title { color:#16a34a; }
.completed-header .tbl-section-count { background:#dcfce7; color:#15803d; }

.empty-cell { text-align:center; padding:36px; color:#94a3b8; font-size:13px; }
.sort-th { cursor:pointer; user-select:none; white-space:nowrap; }
.sort-th:hover { color:#2563eb; background:#f0f6ff; }
.sort-th .arr { font-size:10px; margin-left:2px; color:#cbd5e1; }
.sort-th.asc .arr::after { content:'▲'; color:#2563eb; }
.sort-th.desc .arr::after { content:'▼'; color:#2563eb; }
.sort-th:not(.asc):not(.desc) .arr::after { content:'⇅'; }

/* ── 인라인 체크박스+날짜 ── */
.cell-wrap { display:flex; align-items:center; gap:5px; }
.cell-check { width:15px; height:15px; accent-color:#2563eb; cursor:pointer; flex-shrink:0; }
.cell-date { font-size:12px; font-weight:600; color:#0f172a; white-space:nowrap; }
.cell-date-input { font-size:11px; border:1px solid #e2e8f0; border-radius:5px; padding:2px 5px; color:#334155; background:#f8fafc; width:88px; cursor:pointer; }
.cell-date-input:focus { outline:none; border-color:#3b82f6; background:#fff; }
.cell-nil { color:#e2e8f0; font-size:12px; }
.cell-check:checked ~ .cell-date-input { border-color:#fca5a5; background:#fff5f5; }
.cell-check:checked ~ .cell-date-input:not([value=""]):valid { border-color:#bbf7d0; background:#f0fdf4; }

/* ── 모달 ── */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
.modal-bg.open { display:flex; }
.modal { background:#fff; border-radius:16px; width:540px; max-width:95vw; padding:28px; position:relative; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.15); }
.modal h2 { font-size:17px; font-weight:800; margin-bottom:20px; color:#0f172a; }
.modal .close-btn { position:absolute; top:18px; right:20px; font-size:16px; cursor:pointer; color:#94a3b8; background:#f1f5f9; border:none; width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; }
.modal .close-btn:hover { background:#e2e8f0; }
.form-group { margin-bottom:14px; }
.form-label { font-size:11px; font-weight:700; color:#475569; margin-bottom:5px; display:block; letter-spacing:.2px; }
.form-input { width:100%; padding:9px 12px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:13px; outline:none; transition:border .15s; }
.form-input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px #eff6ff; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-footer { display:flex; gap:8px; margin-top:20px; justify-content:flex-end; }
.btn-cancel { padding:9px 18px; border:1.5px solid #e2e8f0; border-radius:8px; background:#fff; font-size:13px; cursor:pointer; color:#64748b; font-weight:600; }
.btn-save   { padding:9px 22px; border:none; border-radius:8px; background:#2563eb; color:#fff; font-size:13px; font-weight:700; cursor:pointer; }
.btn-save:hover { background:#1d4ed8; }
.btn-del    { padding:9px 16px; border:1.5px solid #fecaca; border-radius:8px; background:#fff; font-size:13px; cursor:pointer; color:#dc2626; font-weight:600; margin-right:auto; }
.btn-del:hover { background:#fef2f2; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div>
    <div class="header-title">🏪 가맹점 오픈 현황</div>
    <div class="header-sub" id="lastUpdated"></div>
  </div>
  <div class="header-right">
    <select class="sort-select" id="sortSelect" onchange="renderAll()" style="display:none;">
      <option value="dbDate">DB 유입일 순</option>
      <option value="storeName">매장명 순</option>
      <option value="stage">단계 순</option>
      <option value="route">경로 순</option>
    </select>
    <button class="btn btn-ghost" id="syncBtn" onclick="syncAllSheets()">🔄 시트 동기화</button>
    <button class="btn btn-ghost" onclick="openRouteModal()">경로 관리</button>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 신규 등록</button>
  </div>
</div>

<!-- 동기화 바 -->
<div class="sync-bar loading" id="syncBar">
  <span id="syncIcon"><span class="spin">⏳</span></span>
  <span id="syncMsg">동기화 중...</span>
</div>

<!-- 기간 탭 -->
<div class="period-wrap"><div class="month-row" id="monthRow"></div><div class="week-row hidden" id="weekRow"></div></div>

<!-- 본문 -->
<div class="main">

  <!-- KPI -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- 퍼널 -->
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">📊 전환율 퍼널</div>
        <div class="card-sub" id="periodLabel"></div>
      </div>
      <select class="filter-sel" id="funnelFilter" onchange="renderAll()">
        <option value="전체">전체 경로</option>
      </select>
    </div>
    <div class="funnel-wrap" id="funnelGrid"></div>
  </div>

  <!-- 경로별 DB -->
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">📡 경로별 DB 유입</div>
        <div class="card-sub" id="lastSyncTime"></div>
      </div>
      <div style="font-size:13px;color:#64748b;">합산 <strong id="routeTotal" style="color:#0f172a;font-size:17px;"></strong> 건</div>
    </div>
    <div class="route-grid" id="routeGrid"></div>
  </div>

  <!-- 매장 테이블 -->
  <div class="card">
    <div class="rf-bar" id="routeFilter"></div>

    <!-- 진행 중 -->
    <div class="tbl-section-header in-progress-header">
      <span class="tbl-section-title">🔶 진행 중인 매장</span>
      <span class="tbl-section-count" id="inProgressCount">0</span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:36px;text-align:center;color:#cbd5e1;">#</th>
          <th class="sort-th" onclick="setSort('name')"><span id="sh_name">매장명</span><span class="arr"></span></th>
          <th>경로</th>
          <th class="sort-th" onclick="setSort('db')"><span>DB 유입</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('consult')"><span>상담</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('info')"><span>정보공개서</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('contract')"><span>계약</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('edu')"><span>교육</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('open')"><span>오픈</span><span class="arr"></span></th>
          <th style="min-width:90px;">진행률</th><th>단계</th>
        </tr>
      </thead>
      <tbody id="inProgressBody"></tbody>
    </table>

    <!-- 오픈 완료 -->
    <div class="tbl-section-header completed-header">
      <span class="tbl-section-title">✅ 오픈 완료 매장</span>
      <span class="tbl-section-count" id="completedCount">0</span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:36px;text-align:center;color:#cbd5e1;">#</th>
          <th class="sort-th" onclick="setSort('name')"><span>매장명</span><span class="arr"></span></th>
          <th>경로</th>
          <th class="sort-th" onclick="setSort('db')"><span>DB 유입</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('consult')"><span>상담</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('info')"><span>정보공개서</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('contract')"><span>계약</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('edu')"><span>교육</span><span class="arr"></span></th>
          <th class="sort-th" onclick="setSort('open')"><span>오픈</span><span class="arr"></span></th>
          <th style="min-width:90px;">진행률</th><th>단계</th>
        </tr>
      </thead>
      <tbody id="completedBody"></tbody>
    </table>
  </div>

</div><!-- /main -->

<!-- 매장 모달 -->
<div class="modal-bg" id="storeModal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">신규 매장 등록</h2>
    <div class="form-group">
      <label class="form-label">매장명 *</label>
      <input class="form-input" id="f_name" placeholder="예: 인생아구찜 강남점" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">DB 경로 *</label>
        <select class="form-input" id="f_route"></select>
      </div>
      <div class="form-group">
        <label class="form-label">DB 유입일</label>
        <input class="form-input" type="date" id="f_db" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">상담일</label>
        <input class="form-input" type="date" id="f_consult" />
      </div>
      <div class="form-group">
        <label class="form-label">정보공개서 발송일</label>
        <input class="form-input" type="date" id="f_info" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">계약일</label>
        <input class="form-input" type="date" id="f_contract" />
      </div>
      <div class="form-group">
        <label class="form-label">교육일</label>
        <input class="form-input" type="date" id="f_edu" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">오픈일</label>
      <input class="form-input" type="date" id="f_open" />
    </div>
    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-input" id="f_memo" rows="2" placeholder="특이사항, 담당자 등"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-del" id="deleteBtn" onclick="deleteStore()" style="display:none;">삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveStore()">저장</button>
    </div>
  </div>
</div>

<!-- 경로 관리 모달 -->
<div class="modal-bg" id="routeModal">
  <div class="modal">
    <button class="close-btn" onclick="closeRouteModal()">✕</button>
    <h2>경로 관리</h2>
    <div id="routeList" style="margin-bottom:14px;"></div>
    <div style="display:flex;gap:8px;">

const ROUTE_KEY_MAP   = { meta:'메타', carrot:'당근', home:'홈페이지', rep:'대표번호', baemin:'배민' };

    {id:2, name:'인생아구찜 성신여대점', route:'대표번호', db:'2026-03-06', consult:'2026-04-10', info:'2026-04-13', contract:'', edu:'', open:'', memo:''},
  ];

}

// ── 동기화 ───────────────────────────────────────────────────────────────────
function showSyncBar(msg,type){
  var b=document.getElementById('syncBar');
  b.className='sync-bar show '+(type||'loading');
  document.getElementById('syncIcon').innerHTML=type==='success'?'✅':type==='error'?'❌':'<span class="spin">⏳</span>';
  document.getElementById('syncMsg').textContent=msg;
}
function hideSyncBar(ms){ setTimeout(()=>document.getElementById('syncBar').classList.remove('show'), ms||3000); }

function syncAllSheets(){
  var btn=document.getElementById('syncBtn');
  btn.textContent='⏳ 동기화 중...';
  showSyncBar('구글 시트에서 DB 수를 불러오는 중...','loading');
  var old=document.getElementById('_jsonp'); if(old) old.remove();
  var timer=setTimeout(()=>{ showSyncBar('시간 초과','error'); hideSyncBar(5000); btn.textContent='🔄 시트 동기화'; },12000);
  window._sheetCb=function(data){
    clearTimeout(timer);
    Object.keys(ROUTE_KEY_MAP).forEach(k=>{
      var r=ROUTE_KEY_MAP[k];
      if(!data[k]||data[k].error) return;
      // 새 구조: { month:{}, week:{} }
      if(data[k].month){
        sheetDbCounts[r] = { month: data[k].month, week: data[k].week||{} };
      } else {
        // 이전 구조 호환
        sheetDbCounts[r] = { month: data[k], week:{} };
      }
    });
    lastSyncAt=new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('fc_sheet_db',JSON.stringify(sheetDbCounts));

  };
  var s=document.createElement('script'); s.id='_jsonp';
  s.src=APPS_SCRIPT_URL+'?callback=_sheetCb&t='+Date.now();
  s.onerror=()=>{ clearTimeout(timer); showSyncBar('동기화 실패','error'); hideSyncBar(5000); btn.textContent='🔄 시트 동기화'; };
  document.head.appendChild(s);
}

// ── 기간 유틸 ────────────────────────────────────────────────────────────────
// 날짜 → 해당 주 키 'YYYY-WNN'
function dateToWeekKey(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(week).padStart(2,'0')}`;
}
// 주 키 → 해당 주 월~일 범위 반환
function weekKeyToRange(wk){
  const [y, wPart] = wk.split('-W');
  const year = parseInt(y), week = parseInt(wPart);
  const jan1 = new Date(year, 0, 1);
  const dayOfWeek = jan1.getDay(); // 0=일
  const startDay = new Date(jan1.getTime() + ((week-1)*7 - dayOfWeek + 1)*86400000);
  const endDay   = new Date(startDay.getTime() + 6*86400000);
  const fmt = d => `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  return `${fmt(startDay)}~${fmt(endDay)}`;
}
function weekKeyLabel(wk){
  const [y, wPart] = wk.split('-W');
  return `${y.slice(2)}년 ${parseInt(wPart)}주`;
}
function monthKeyLabel(mk){
  const [y,m]=mk.split('-'); return `${y.slice(2)}년 ${parseInt(m)}월`;
}
function periodDisplayLabel(p){
  if(p==='전체') return '전체 기간';
  if(p.includes('-W')) return weekKeyLabel(p) + ' (' + weekKeyToRange(p) + ')';
  return monthKeyLabel(p);
}

// 날짜가 기간에 포함되는지
function dateInPeriod(dateStr, period){
  if(!dateStr) return false;
  if(period==='전체') return true;
  if(period.includes('-W')) return dateToWeekKey(dateStr)===period;
  return dateStr.startsWith(period);
}

// 매장이 기간과 연관되는지 (2026년 데이터만)
function storeInPeriod(s, period){
  // 2026년 데이터가 하나라도 있어야 포함
  const has2026 = ['db','consult','info','contract','edu','open'].some(k=>s[k]&&s[k].startsWith('2026'))
    || ['db','consult','info','contract','edu','open'].some(k=>s['chk_'+k]);
  if(!has2026) return false;
  if(period==='전체') return true;
  return ['db','consult','info','contract','edu','open'].some(k=>dateInPeriod(s[k],period));
}

// 2026년 월 & 주 목록
function buildPeriods(){
  const months = new Set();
  const weeks  = new Set();
  stores.forEach(s=>{
    ['db','consult','info','contract','edu','open'].forEach(k=>{
      if(!s[k] || !s[k].startsWith('2026')) return;
      months.add(s[k].slice(0,7));
      const wk = dateToWeekKey(s[k]);
      if(wk) weeks.add(wk);
    });
  });
  // 시트 DB 카운트 월/주 포함
  Object.values(sheetDbCounts).forEach(sd=>{
    const mc = sd.month || sd; // 이전 구조 호환
    Object.keys(mc).filter(ym=>ym.startsWith('2026')).forEach(ym=>months.add(ym));
    const wc = sd.week || {};
    Object.keys(wc).filter(wk=>wk.startsWith('2026')).forEach(wk=>weeks.add(wk));
  });
  return {
    months: [...months].sort().reverse(),
    weeks:  [...weeks].sort().reverse()
  };
}

// ── 헬퍼 ─────────────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem('fc_stores',  JSON.stringify(stores));
  localStorage.setItem('fc_routes',  JSON.stringify(routes));
  localStorage.setItem('fc_month2',  activeMonth);
  localStorage.setItem('fc_week',    activeWeek||'');
}
function fmtDate(d){ if(!d) return null; const p=d.split('-'); return `${p[1]}/${p[2]}`; }
function stageOf(s){
  const done = f => s[f] || s['chk_'+f]; // 날짜 OR 체크 플래그
  if(done('open'))     return {label:'오픈',      num:6, color:'#16a34a'};
  if(done('edu'))      return {label:'교육',      num:5, color:'#7c3aed'};
  if(done('contract')) return {label:'계약',      num:4, color:'#2563eb'};
  if(done('info'))     return {label:'정보공개서', num:3, color:'#0891b2'};
  if(done('consult'))  return {label:'상담',      num:2, color:'#ea580c'};
  if(done('db'))       return {label:'초기DB',    num:1, color:'#64748b'};
  return                      {label:'대기',      num:0, color:'#cbd5e1'};
}
function progressOf(s){ return Math.round(stageOf(s).num/6*100); }
function routeBadge(r){
  const m={메타:'badge-meta',당근:'badge-carrot',대표번호:'badge-rep',홈페이지:'badge-home',마이챠:'badge-mycha',배민:'badge-baemin'};
  return m[r]||'badge-home';
}
function dotColor(r){
  const m={메타:'#a78bfa',당근:'#fb923c',대표번호:'#34d399',홈페이지:'#38bdf8',마이챠:'#f472b6',배민:'#4ade80'};
  return m[r]||'#94a3b8';
}
function filteredStores(){ return stores.filter(s=>storeInPeriod(s,getActivePeriod())); }

function getRouteDbCount(route){
  const p=getActivePeriod();
  const sd=sheetDbCounts[route];
  if(sd){
    const mc = sd.month || sd; // 월별 데이터
    const wc = sd.week  || {}; // 주별 데이터
    if(p==='전체'){
      return Object.keys(mc).filter(ym=>ym.startsWith('2026')).reduce((a,k)=>a+mc[k],0);
    }
    if(p.includes('-W')){
      // 주별: 시트 주별 데이터 우선, 없으면 등록 매장 카운트
      if(wc[p]!==undefined) return wc[p];
      return filteredStores().filter(s=>s.route===route&&s.db).length;
    }
    return mc[p]||0;
  }
  return filteredStores().filter(s=>s.route===route&&s.db).length;
}
function getTotalDb(){ return routes.reduce((a,r)=>a+getRouteDbCount(r),0); }

// ── 렌더 ─────────────────────────────────────────────────────────────────────
function renderAll(){
  document.getElementById('lastUpdated').textContent =
    '마지막 업데이트: '+new Date().toLocaleString('ko-KR',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  if(lastSyncAt) document.getElementById('lastSyncTime').textContent='마지막 동기화: '+lastSyncAt;

  const p=getActivePeriod();
  document.getElementById('periodLabel').textContent = periodDisplayLabel(p);

  renderKPI();
  renderFunnelFilter();
  renderFunnel();
  renderRouteCards();
  renderRouteFilter();
  renderTables();
}

// ── 기간 탭 ──
function renderPeriodBar(){
  const {months} = buildPeriods();

  // ── 월 행 ──
  let mHtml = `<div class="ptab all-tab ${activeMonth==='전체'?'active':''}" onclick="setMonth('전체')">2026년 전체</div>`;
  months.forEach(m=>{
    mHtml += `<div class="ptab ${activeMonth===m?'active':''}" onclick="setMonth('${m}')">${monthKeyLabel(m)}</div>`;
  });
  document.getElementById('monthRow').innerHTML = mHtml;

  // ── 주 행: 선택된 월의 주만 표시 ──
  const weekRow = document.getElementById('weekRow');
  if(activeMonth==='전체'){
    weekRow.classList.add('hidden');
  } else {
    // 해당 월에 속하는 주 목록 (매장 데이터 기준)
    const weekSet = new Set();
    stores.forEach(s=>{
      ['db','consult','info','contract','edu','open'].forEach(k=>{
        if(!s[k]||!s[k].startsWith(activeMonth)) return;
        const wk=dateToWeekKey(s[k]);
        if(wk) weekSet.add(wk);
      });
    });
    const weeksInMonth = [...weekSet].sort().reverse();

    if(weeksInMonth.length===0){
      weekRow.classList.add('hidden');
    } else {
      weekRow.classList.remove('hidden');
      let wHtml = `<span style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.5px;padding:0 8px;">주간</span>`;
      wHtml += `<div class="wtab ${!activeWeek?'active':''}" onclick="setWeek(null)">월 전체</div>`;
      weeksInMonth.forEach(w=>{
        const [,wPart]=w.split('-W');
        wHtml += `<div class="wtab ${activeWeek===w?'active':''}" onclick="setWeek('${w}')">${parseInt(wPart)}주<span class="wrange">${weekKeyToRange(w)}</span></div>`;
      });
      weekRow.innerHTML = wHtml;
    }
  }
}
function setMonth(m){
  activeMonth=m;
  activeWeek=null; // 월 바꾸면 주 초기화
  save(); renderAll();
}
function setWeek(w){
  activeWeek=w;
  save(); renderAll();
}

// ── KPI ──
function renderKPI(){
  const fs=filteredStores();
  const totalDb=getTotalDb();
  const dk=(s,f)=>!!(s[f]||s['chk_'+f]);
  const opened    =fs.filter(s=>dk(s,'open')).length;
  const contracted=fs.filter(s=>dk(s,'contract')&&!dk(s,'open')).length;
  const consulting=fs.filter(s=>dk(s,'consult')&&!dk(s,'contract')).length;
  const initial   =fs.filter(s=>dk(s,'db')&&!dk(s,'consult')).length;
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi-card"><div class="kpi-icon ic-blue">📥</div><div><div class="kpi-label">총 DB 유입</div><div class="kpi-value">${totalDb}</div><div class="kpi-sub">${periodDisplayLabel(getActivePeriod())}</div></div></div>
    <div class="kpi-card"><div class="kpi-icon ic-green">🎉</div><div><div class="kpi-label">오픈 완료</div><div class="kpi-value">${opened}</div><div class="kpi-sub">운영 중</div></div></div>
    <div class="kpi-card"><div class="kpi-icon ic-amber">📝</div><div><div class="kpi-label">계약 완료</div><div class="kpi-value">${contracted}</div><div class="kpi-sub">오픈 대기</div></div></div>
    <div class="kpi-card"><div class="kpi-icon ic-purple">💬</div><div><div class="kpi-label">상담 진행</div><div class="kpi-value">${consulting}</div><div class="kpi-sub">계약 전</div></div></div>
    <div class="kpi-card"><div class="kpi-icon ic-red">🔥</div><div><div class="kpi-label">초기 DB</div><div class="kpi-value">${initial}</div><div class="kpi-sub">상담 전</div></div></div>`;
}

// ── 퍼널 필터 ──
function renderFunnelFilter(){
  const sel=document.getElementById('funnelFilter'), val=sel.value||'전체';
  sel.innerHTML=`<option value="전체">전체 경로</option>`+routes.map(r=>`<option value="${r}"${r===val?'selected':''}>${r}</option>`).join('');
}

// ── 퍼널 ──
function renderFunnel(){
  const rf=document.getElementById('funnelFilter').value||'전체';
  const fs=filteredStores();
  const src=rf==='전체'?fs:fs.filter(s=>s.route===rf);
  const tdb=rf==='전체'?getTotalDb():getRouteDbCount(rf);
  const done=(s,f)=>!!(s[f]||s['chk_'+f]);
  const c=src.filter(s=>done(s,'consult')).length, i=src.filter(s=>done(s,'info')).length,
        ct=src.filter(s=>done(s,'contract')).length, e=src.filter(s=>done(s,'edu')).length,
        o=src.filter(s=>done(s,'open')).length;
  const rh=(a,b)=>{ if(!b) return ''; const v=Math.round(a/b*100); const cl=v>=50?'up':v>=20?'mid':'low'; return `<div class="fs-rate ${cl}">${v}%</div>`; };
  const steps=[
    {icon:'🔥',label:'DB 유입',  val:tdb, r:''},
    {icon:'💬',label:'상담',     val:c,   r:rh(c,tdb)},
    {icon:'📋',label:'정보공개서',val:i,   r:rh(i,c)},
    {icon:'✍️',label:'계약',     val:ct,  r:rh(ct,i)},
    {icon:'📚',label:'교육',     val:e,   r:rh(e,ct)},
    {icon:'🎉',label:'오픈',     val:o,   r:rh(o,e)},
  ];
  document.getElementById('funnelGrid').innerHTML=steps.map((s,idx)=>`
    <div class="funnel-item">
      <div class="funnel-step">
        <div class="fs-icon">${s.icon}</div>
        <div class="fs-label">${s.label}</div>
        <div class="fs-value">${s.val}</div>${s.r}
      </div>${idx<5?'<div class="f-arrow">›</div>':''}
    </div>`).join('');
}

// ── 경로 카드 ──

  const fs=filteredStores(), total=getTotalDb();
  document.getElementById('routeTotal').textContent=total;
  const synced=r=>sheetDbCounts[r]&&Object.keys(sheetDbCounts[r]).length;

    <div class="rc-stat"><span class="rsl">계약</span><span class="rsv">${fs.filter(s=>s.contract).length}</span></div>
    <div class="rc-stat"><span class="rsl">오픈</span><span class="rsv">${fs.filter(s=>s.open).length}</span></div>

      <div class="rc-num">${cnt}<span class="rc-unit"> 건</span></div>
      <hr/>
      <div class="rc-stat"><span class="rsl">등록 매장</span><span class="rsv">${rs.length}</span></div>
      <div class="rc-stat"><span class="rsl">상담</span><span class="rsv">${rs.filter(s=>s.consult).length}</span></div>
      <div class="rc-stat"><span class="rsl">계약</span><span class="rsv">${rs.filter(s=>s.contract).length}</span></div>
      <div class="rc-stat"><span class="rsl">오픈</span><span class="rsv">${rs.filter(s=>s.open).length}</span></div>

// ── 경로 필터 ──
function renderRouteFilter(){
  const clsMap={전체:'all',메타:'meta',당근:'carrot',홈페이지:'home',대표번호:'rep',마이챠:'mycha',배민:'baemin'};
  document.getElementById('routeFilter').innerHTML=
    ['전체',...routes].map(r=>`<button class="rf-btn ${clsMap[r]||''} ${activeRoute===r?'active':''}" onclick="setRoute('${r}')">${r}</button>`).join('');
}
function setRoute(r){ activeRoute=r; renderRouteFilter(); renderTables(); }
function setSort(field){
  if(sortField===field) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortField=field; sortDir='desc'; }
  renderTables();
}

// ── 테이블 (진행 중 / 완료 분리) ──
function renderTables(){
  let fs=filteredStores();
  if(activeRoute!=='전체') fs=fs.filter(s=>s.route===activeRoute);
  const sort=document.getElementById('sortSelect').value;
  const sortFn=(a,b)=>{
    let va = a[sortField]||'', vb = b[sortField]||'';
    if(sortField==='name') { va=a.name; vb=b.name; }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return sortDir==='asc' ? cmp : -cmp;
  };

  const doneF=(s,f)=>!!(s[f]||s['chk_'+f]);
  const inProgress = fs.filter(s=>!doneF(s,'open')).sort(sortFn);
  const completed  = fs.filter(s=>doneF(s,'open')).sort(sortFn);

  document.getElementById('inProgressCount').textContent = inProgress.length + '개';
  document.getElementById('completedCount').textContent  = completed.length  + '개';

  // 체크박스+날짜 셀 생성
  const cellHtml=(sid, field, val, chk)=>{
    // chk: 체크 여부 (날짜 없어도 체크 가능)
    const isChecked = chk === true || (val && val.trim() !== '');
    const dateVal = val || '';
    const dateStyle = isChecked && !dateVal
      ? 'border-color:#fca5a5;background:#fff5f5;'
      : isChecked && dateVal
      ? 'border-color:#bbf7d0;background:#f0fdf4;'
      : '';
    return `<div class="cell-wrap">
      <input type="checkbox" class="cell-check" ${isChecked ? 'checked' : ''}
        onchange="toggleField(${sid},'${field}',this.checked,this.nextElementSibling.value)">
      <input type="date" class="cell-date-input" value="${dateVal}" style="${dateStyle}"
        onchange="updateField(${sid},'${field}',this.value)">
    </div>`;
  };

  const numTd = idx => `<td style="text-align:center;font-size:11px;color:#94a3b8;font-weight:700;">${idx+1}</td>`;

  // 진행 중 매장 행
  const rowHtml=(s,idx)=>{
    const st=stageOf(s), pg=progressOf(s);
    return `<tr>
      ${numTd(idx)}
      <td class="store-name">${s.name}</td>
      <td><span class="route-badge ${routeBadge(s.route)}">${s.route}</span></td>
      <td>${cellHtml(s.id,'db',s.db,s.chk_db)}</td>
      <td>${cellHtml(s.id,'consult',s.consult,s.chk_consult)}</td>
      <td>${cellHtml(s.id,'info',s.info,s.chk_info)}</td>
      <td>${cellHtml(s.id,'contract',s.contract,s.chk_contract)}</td>
      <td>${cellHtml(s.id,'edu',s.edu,s.chk_edu)}</td>
      <td>${cellHtml(s.id,'open',s.open,s.chk_open)}</td>
      <td>
        <div class="prog-bar"><div class="prog-fill" style="width:${pg}%;background:${st.color};"></div></div>
        <div class="prog-text">${pg}% · ${Math.round(pg/100*6)}/6단계</div>
      </td>
      <td><button class="stage-btn" onclick="openEditModal(${s.id})" style="border-color:${st.color};color:${st.color};">${st.label}</button></td>
    </tr>`;
  };

  // 오픈 완료 매장 행 (진행률 없음)
  const completedRowHtml=(s,idx)=>{
    const openDate = s.open ? `<span style="font-size:12px;font-weight:700;color:#16a34a;">${fmtDate(s.open)}</span>` : '<span style="font-size:11px;color:#94a3b8;">날짜 미입력</span>';
    return `<tr>
      ${numTd(idx)}
      <td class="store-name">${s.name}</td>
      <td><span class="route-badge ${routeBadge(s.route)}">${s.route}</span></td>
      <td>${cellHtml(s.id,'db',s.db,s.chk_db)}</td>
      <td>${cellHtml(s.id,'consult',s.consult,s.chk_consult)}</td>
      <td>${cellHtml(s.id,'info',s.info,s.chk_info)}</td>
      <td>${cellHtml(s.id,'contract',s.contract,s.chk_contract)}</td>
      <td>${cellHtml(s.id,'edu',s.edu,s.chk_edu)}</td>
      <td>${cellHtml(s.id,'open',s.open,s.chk_open)}</td>

    </tr>`;
  };

  document.getElementById('inProgressBody').innerHTML = inProgress.length
    ? inProgress.map((s,i)=>rowHtml(s,i)).join('')
    : `<tr><td colspan="11" class="empty-cell">진행 중인 매장이 없습니다</td></tr>`;

  document.getElementById('completedBody').innerHTML = completed.length
    ? completed.map((s,i)=>rowHtml(s,i)).join('')
    : `<tr><td colspan="11" class="empty-cell">오픈 완료된 매장이 없습니다</td></tr>`;

  // 정렬 화살표 업데이트
  document.querySelectorAll('.sort-th').forEach(th=>{
    th.classList.remove('asc','desc');
    const f = th.getAttribute('onclick').match(/setSort\('(.+?)'\)/)?.[1];
    if(f===sortField) th.classList.add(sortDir);
  });
}

// ── 모달 ─────────────────────────────────────────────────────────────────────
function populateRouteSelect(){
  document.getElementById('f_route').innerHTML=routes.map(r=>`<option value="${r}">${r}</option>`).join('');
}
function openAddModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='신규 매장 등록';
  document.getElementById('deleteBtn').style.display='none';
  ['name','memo'].forEach(k=>document.getElementById('f_'+k).value='');
  ['db','consult','info','contract','edu','open'].forEach(k=>document.getElementById('f_'+k).value='');
  populateRouteSelect();
  document.getElementById('storeModal').classList.add('open');
}
function openEditModal(id){
  const s=stores.find(x=>x.id===id); if(!s) return;
  editingId=id;
  document.getElementById('modalTitle').textContent='매장 정보 수정';
  document.getElementById('deleteBtn').style.display='';
  populateRouteSelect();
  document.getElementById('f_name').value=s.name||'';
  document.getElementById('f_route').value=s.route||'';
  ['db','consult','info','contract','edu','open','memo'].forEach(k=>document.getElementById('f_'+k).value=s[k]||'');
  document.getElementById('storeModal').classList.add('open');
}
function closeModal(){ document.getElementById('storeModal').classList.remove('open'); }
function saveStore(){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ alert('매장명을 입력해주세요.'); return; }
  const data={name, route:document.getElementById('f_route').value,
    db:document.getElementById('f_db').value, consult:document.getElementById('f_consult').value,
    info:document.getElementById('f_info').value, contract:document.getElementById('f_contract').value,
    edu:document.getElementById('f_edu').value, open:document.getElementById('f_open').value,
    memo:document.getElementById('f_memo').value};
  if(editingId){ const idx=stores.findIndex(x=>x.id===editingId); stores[idx]={...stores[idx],...data}; }
  else { data.id=Date.now(); stores.push(data); }
  save(); closeModal(); renderAll();
}
function deleteStore(){
  if(!confirm('이 매장을 삭제하시겠습니까?')) return;
  stores=stores.filter(x=>x.id!==editingId); save(); closeModal(); renderAll();
}

// ── 인라인 체크박스/날짜 편집 ────────────────────────────────────────────────
function toggleField(id, field, checked, dateVal){
  const s = stores.find(x=>x.id===id); if(!s) return;
  const chkKey = 'chk_' + field;
  if(checked){
    s[chkKey] = true;          // 체크 플래그
    if(dateVal) s[field] = dateVal; // 날짜 있으면 저장, 없으면 그대로
  } else {
    s[chkKey] = false;
    s[field] = '';             // 체크 해제 시 날짜도 삭제
  }
  save();
  renderKPI(); renderFunnel(); renderRouteCards(); renderTables();
}
function updateField(id, field, val){
  const s = stores.find(x=>x.id===id); if(!s) return;
  s[field] = val;
  save();
  renderKPI(); renderFunnel(); renderRouteCards(); renderTables();
}

// ── 경로 모달 ────────────────────────────────────────────────────────────────
function openRouteModal(){ renderRouteList(); document.getElementById('routeModal').classList.add('open'); }
function closeRouteModal(){ document.getElementById('routeModal').classList.remove('open'); }
function renderRouteList(){
  document.getElementById('routeList').innerHTML=routes.map((r,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f1f5f9;">
      <span style="width:8px;height:8px;border-radius:50%;background:${dotColor(r)};display:inline-block;"></span>
      <span style="flex:1;font-size:14px;font-weight:600;">${r}</span>
      <button onclick="removeRoute(${i})" style="padding:3px 10px;border:1.5px solid #fecaca;border-radius:6px;background:#fff;color:#dc2626;font-size:12px;font-weight:600;cursor:pointer;">삭제</button>
    </div>`).join('');
}
function addRoute(){
  const v=document.getElementById('newRouteName').value.trim();
  if(!v||routes.includes(v)) return;
  routes.push(v); document.getElementById('newRouteName').value='';
  save(); renderRouteList(); renderAll();
}
function removeRoute(i){
  if(!confirm(`'${routes[i]}' 경로를 삭제하시겠습니까?`)) return;
  routes.splice(i,1); save(); renderRouteList(); renderAll();
}

document.getElementById('storeModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('routeModal').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeRouteModal(); });

// ── 초기화 ───────────────────────────────────────────────────────────────────
renderAll();
syncAllSheets();
</script>
</body>
</html>
